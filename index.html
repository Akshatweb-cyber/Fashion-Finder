<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion Finder AI</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-top: 40px;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p.subtitle {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }
        .upload-box {
            border: 2px dashed #475569;
            border-radius: 15px;
            padding: 30px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        .upload-box:hover {
            border-color: #38bdf8;
            background: rgba(56, 189, 248, 0.05);
        }
        #fileInput {
            display: none;
        }
        .upload-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        #preview {
            max-width: 100%;
            max-height: 200px;
            border-radius: 10px;
            display: none;
            margin-top: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .btn {
            background: linear-gradient(to right, #2563eb, #4f46e5);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.6);
        }
        .btn:disabled {
            background: #334155;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        #status {
            margin-top: 20px;
            font-size: 0.95rem;
            color: #cbd5e1;
            font-weight: 500;
        }
        .results {
            margin-top: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            text-align: left;
            width: 100%;
        }
        .item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }
        .item:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.06);
        }
        .item img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            background: #1e293b;
        }
        .item-info {
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-grow: 1;
        }
        .item-title {
            font-size: 0.8rem;
            font-weight: 500;
            color: #e2e8f0;
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .item-price {
            font-size: 0.9rem;
            color: #34d399;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .item a {
            display: block;
            text-align: center;
            background: #1e293b;
            color: #38bdf8;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid rgba(56, 189, 248, 0.2);
            transition: all 0.2s;
        }
        .item a:hover {
            background: #38bdf8;
            color: #0f172a;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Fashion Finder AI</h1>
        <p class="subtitle">Upload any clothes image to find direct shopping links</p>

        <div class="upload-box" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">📸</div>
            <p id="uploadText">Tap to upload clothes image</p>
            <input type="file" id="fileInput" accept="image/*" onchange="previewImage(event)">
            <img id="preview" alt="Preview">
        </div>

        <button class="btn" id="searchBtn" onclick="startSearch()" disabled>Find Matching Clothes</button>
        
        <div id="status"></div>
        <div class="results" id="resultsList"></div>
    </div>

    <script>
        let compressedImageBase64 = "";
        const APIFY_TOKEN = "Apify_api_UTe2M3cb2vuTnblHxO3SQg8yvaRn0T0dW9Rv"; 

        function previewImage(event) {
            const fileInput = event.target;
            const preview = document.getElementById('preview');
            const uploadText = document.getElementById('uploadText');
            const searchBtn = document.getElementById('searchBtn');
            const status = document.getElementById('status');

            if (fileInput.files && fileInput.files[0]) {
                status.innerHTML = "⚡ Optimizing image for AI...";
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'inline-block';
                    uploadText.style.display = 'none';

                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 400; // Thoda aur compress kiya taaki jaldi response aaye
                        let width = img.width;
                        let height = img.height;

                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        const fullBase64 = canvas.toDataURL('image/jpeg', 0.5);
                        compressedImageBase64 = fullBase64.split(',')[1]; 
                        
                        status.innerHTML = "✅ Image ready!";
                        searchBtn.disabled = false;
                    };
                }
                reader.readAsDataURL(fileInput.files[0]);
            }
        }

        async function startSearch() {
            const status = document.getElementById('status');
            const resultsList = document.getElementById('resultsList');
            const searchBtn = document.getElementById('searchBtn');

            if (!compressedImageBase64) return;

            searchBtn.disabled = true;
            resultsList.innerHTML = "";
            status.innerHTML = "🔍 AI is searching matching products...";

            try {
                // Direct Apify Endpoint bina kisi proxy jhanjhat ke
                const response = await fetch(`https://api.apify.com/v2/acts/borderline~google-lens/run-sync?token=${APIFY_TOKEN}`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        "rawImageData": compressedImageBase64,
                        "maxResults": 10,
                        "language": "en"
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`Status ${response.status}`);
                }
                
                const data = await response.json();
                
                // Sabhi tarah ke nested data structure ko handle karne ke liye check
                let shoppingResults = [];
                if (data?.shopping_results) {
                    shoppingResults = data.shopping_results;
                } else if (data?.output?.body?.shopping_results) {
                    shoppingResults = data.output.body.shopping_results;
                } else if (data?.output?.data?.shopping_results) {
                    shoppingResults = data.output.data.shopping_results;
                } else if (data?.output?.shopping_results) {
                    shoppingResults = data.output.shopping_results;
                }
                
                if (shoppingResults && shoppingResults.length > 0) {
                    status.innerHTML = "✅ Found matches for you!";
                    shoppingResults.forEach(product => {
                        const title = product.title || "Fashion Item";
                        const link = product.link || "#";
                        const thumbnail = product.thumbnail || "https://via.placeholder.com/150";
                        const price = product.price ? product.price : "Check Price";

                        resultsList.innerHTML += `
                            <div class="item">
                                <img src="${thumbnail}" alt="product">
                                <div class="item-info">
                                    <div class="item-title">${title}</div>
                                    <div class="item-price">${price}</div>
                                    <a href="${link}" target="_blank">Buy Now</a>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    status.innerHTML = "❌ No matching items found or structure changed. Try another photo!";
                }
            } catch (error) {
                console.error("Error:", error);
                status.innerHTML = "⚠️ Error: " + error.message + ". Please try again.";
            } finally {
                searchBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
